version: '3.9'

services:
  # Frontend Service
  frontend:
    image: pcdpbit/academics-frontend:v1.0.0
    container_name: cms-frontend
    ports:
      - "8083:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cms-network
      # - reverse-proxy

  # Backend Service
  backend:
    image: pcdpbit/academics-backend:v1.0.0
    container_name: cms-backend
    ports:
      - "5003:5000"
    env_file:
      # - /envs/cms-backend.env
      - ./server/.env
    volumes:
      - ./server/uploads:/app/uploads
    # depends_on:
    #   - mysql
    restart: unless-stopped
    networks:
      - cms-network
      # - reverse-proxy

  # MySQL Database Service (Optional - if you're using MySQL)
  # mysql:
  #   image: mysql:8.0
  #   container_name: cms-mysql
  #   ports:
  #     - "3309:3306"
  #   env_file:
  #     - ./server/.env
  #   command:
  #     --bind-address=0.0.0.0
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./server/database:/docker-entrypoint-initdb.d
  #   restart: unless-stopped
  #   networks:
  #     - cms-network
  #     - reverse-proxy

networks:
  cms-network:
    driver: bridge
